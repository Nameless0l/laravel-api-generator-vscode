<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e" stroke="#e74c3c" stroke-width="3"/>

  <!-- Laravel-style "L" shape -->
  <path d="M38 30 L38 82 L62 82" fill="none" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- API text -->
  <text x="72" y="80" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#3498db">API</text>

  <!-- Gear/cog (top right) -->
  <g transform="translate(92, 36)" fill="none" stroke="#f39c12" stroke-width="2.5">
    <circle cx="0" cy="0" r="7"/>
    <line x1="0" y1="-12" x2="0" y2="-8"/>
    <line x1="0" y1="8" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="-8" y2="0"/>
    <line x1="8" y1="0" x2="12" y2="0"/>
    <line x1="-8.5" y1="-8.5" x2="-5.7" y2="-5.7"/>
    <line x1="5.7" y1="5.7" x2="8.5" y2="8.5"/>
    <line x1="8.5" y1="-8.5" x2="5.7" y2="-5.7"/>
    <line x1="-5.7" y1="5.7" x2="-8.5" y2="8.5"/>
  </g>

  <!-- Lightning bolt (speed/generation) -->
  <polygon points="56,20 48,42 56,42 50,58 66,36 58,36 64,20" fill="#f1c40f" opacity="0.9"/>

  <!-- Bottom dots (endpoints) -->
  <circle cx="40" cy="100" r="4" fill="#2ecc71"/>
  <circle cx="56" cy="100" r="4" fill="#3498db"/>
  <circle cx="72" cy="100" r="4" fill="#e74c3c"/>
  <circle cx="88" cy="100" r="4" fill="#f39c12"/>
</svg>
